<!DOCTYPE html>
<html>
<head>
    <title>Python CRDT Editor</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f9; }
        textarea { width: 100%; height: 300px; font-size: 18px; padding: 10px; }
        .header { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="header">
        <h2>Real-Time Editor Engine</h2>
        <p>User ID: <span id="userId"></span></p>
    </div>
    
    <textarea id="editor" placeholder="Type here..."></textarea>

    <script>
        const clientId = "User_" + Math.floor(Math.random() * 1000);
        document.getElementById("userId").innerText = clientId;

        // Remember to use your actual Render URL here!
        const ws = new WebSocket(`wss://crdteditoronline.onrender.com/ws/${clientId}`); 
        const editor = document.getElementById("editor");

        editor.disabled = true;
        editor.placeholder = "Connecting to server... Please wait.";

        ws.onopen = function() {
            editor.disabled = false;
            editor.placeholder = "Type here...";
        };

        // --- THE CRDT BRAIN ---
        let nodes = []; // Local copy of the document array
        let isSyncing = false; 
        let previousText = ""; 

        // Fractional Indexing Math (Moved to Client)
        function generatePositionBetween(left, right) {
            let leftStr = left || "0";
            let rightStr = right || "9";
            let base = 0;
            let newPos = "";

            while (base < leftStr.length || base < rightStr.length) {
                let leftChar = leftStr[base] || "0";
                let rightChar = rightStr[base] || "9";

                if (leftChar === rightChar) {
                    newPos += leftChar;
                    base++;
                    continue;
                }

                let leftVal = leftChar.charCodeAt(0);
                let rightVal = rightChar.charCodeAt(0);

                if (rightVal - leftVal > 1) {
                    let midVal = Math.floor((leftVal + rightVal) / 2);
                    newPos += String.fromCharCode(midVal);
                    return newPos;
                } else {
                    newPos += leftChar;
                    leftStr += "0";
                    base++;
                }
            }
            return newPos + "5";
        }

        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            if (data.type === "sync") {
                nodes = data.nodes; // Sync our local CRDT with the server's sorted truth
                const newText = nodes.map(n => n.value).join('');

                if (data.origin === clientId) {
                    previousText = newText;
                    return; 
                }

                isSyncing = true;
                const isFocused = document.activeElement === editor;
                const cursorPosition = editor.selectionStart;
                const oldLength = editor.value.length;
                
                let diffStart = 0;
                while (diffStart < oldLength && diffStart < newText.length && previousText[diffStart] === newText[diffStart]) {
                    diffStart++;
                }
                
                editor.value = newText; 
                previousText = newText; 
                
                if (isFocused) {
                    const lengthDiff = newText.length - oldLength;
                    let newCursor = cursorPosition;
                    if (diffStart < cursorPosition) {
                        newCursor += lengthDiff;
                    }
                    editor.setSelectionRange(newCursor, newCursor); 
                }
                isSyncing = false;
            }
        };

        editor.addEventListener('input', function(e) {
            if (ws.readyState !== WebSocket.OPEN) return; 
            if (isSyncing) return;
            
            const currentText = editor.value;

            let prefixLen = 0;
            while (prefixLen < previousText.length && prefixLen < currentText.length && previousText[prefixLen] === currentText[prefixLen]) {
                prefixLen++;
            }
            
            let suffixLen = 0;
            while (suffixLen < (previousText.length - prefixLen) && suffixLen < (currentText.length - prefixLen) && 
                   previousText[previousText.length - 1 - suffixLen] === currentText[currentText.length - 1 - suffixLen]) {
                suffixLen++;
            }
            
            // Handle Deletions locally first, then broadcast
            const deletedLen = previousText.length - prefixLen - suffixLen;
            for (let i = 0; i < deletedLen; i++) {
                const deletedNode = nodes[prefixLen]; // Always at prefixLen because array shrinks
                ws.send(JSON.stringify({
                    type: "delete",
                    position: deletedNode.position // Sending specific mathematical position
                }));
                nodes.splice(prefixLen, 1); // Shrink local array
            }
            
            // Handle Insertions locally first, then broadcast
            const insertedText = currentText.slice(prefixLen, currentText.length - suffixLen);
            for (let j = 0; j < insertedText.length; j++) {
                const insertIndex = prefixLen + j;
                const leftPos = insertIndex > 0 ? nodes[insertIndex - 1].position : null;
                const rightPos = insertIndex < nodes.length ? nodes[insertIndex].position : null;
                
                const newPos = generatePositionBetween(leftPos, rightPos);
                const newNode = { value: insertedText[j], position: newPos, userId: clientId };
                
                nodes.splice(insertIndex, 0, newNode); // Grow local array
                
                ws.send(JSON.stringify({
                    type: "insert",
                    value: newNode.value,
                    position: newNode.position // Sending specific mathematical position
                }));
            }

            previousText = currentText; 
        });
    </script>
</body>
</html>
