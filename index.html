<!DOCTYPE html>
<html>
<head>
    <title>Python CRDT Editor</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f9; }
        textarea { width: 100%; height: 300px; font-size: 18px; padding: 10px; }
        .header { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="header">
        <h2>Real-Time Editor Engine</h2>
        <p>User ID: <span id="userId"></span></p>
    </div>
    
    <textarea id="editor" placeholder="Type here..."></textarea>

    <script>
        // Generate a random User ID for this browser tab
        const clientId = "User_" + Math.floor(Math.random() * 1000);
        document.getElementById("userId").innerText = clientId;

        // Connect to the Python FastAPI backend
        const ws = new WebSocket(`wss://crdteditoronline.onrender.com/ws/${clientId}`);
        const editor = document.getElementById("editor");

        let isSyncing = false; // Prevents infinite loops when server updates client

        // Listen for updates from Python
        // Listen for updates from Python
        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            if (data.type === "sync") {
                
                // --- THE FIX ---
                // If we are the ones who caused this update, ignore the echo!
                // This stops the server from overwriting our fast typing.
                if (data.origin === clientId) {
                    return; 
                }
                // ---------------

                isSyncing = true;
                const isFocused = document.activeElement === editor;
                const cursorPosition = editor.selectionStart;
                
                // Calculate the difference in length to shift the cursor if someone else typed
                const oldLength = editor.value.length;
                
                editor.value = data.content; 
                
                if (isFocused) {
                    // If someone else added text, push our cursor forward so it doesn't fall behind
                    const lengthDiff = data.content.length - oldLength;
                    const newCursor = cursorPosition > 0 ? cursorPosition + lengthDiff : cursorPosition;
                    editor.setSelectionRange(newCursor, newCursor); 
                }
                
                isSyncing = false;
            }
        };

        // Listen for typing on the keyboard
        editor.addEventListener('input', function(e) {
            if (isSyncing) return;
            
            const cursorPosition = editor.selectionStart;
            
            if (e.inputType === "insertText") {
                // Send an insert command to Python
                ws.send(JSON.stringify({
                    type: "insert",
                    index: cursorPosition - 1,
                    value: e.data
                }));
            } else if (e.inputType === "deleteContentBackward") {
                // Send a delete command to Python
                ws.send(JSON.stringify({
                    type: "delete",
                    index: cursorPosition
                }));
            }
        });
    </script>
</body>
</html>
