<!DOCTYPE html>
<html>
<head>
    <title>Python CRDT Editor</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f9; }
        textarea { width: 100%; height: 300px; font-size: 18px; padding: 10px; }
        .header { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="header">
        <h2>Real-Time Editor Engine</h2>
        <p>User ID: <span id="userId"></span></p>
    </div>
    
    <textarea id="editor" placeholder="Type here..."></textarea>

    <script>
        const clientId = "User_" + Math.floor(Math.random() * 1000);
        document.getElementById("userId").innerText = clientId;

        // Make sure to use your actual Render URL here!
        const ws = new WebSocket(`wss://crdteditoronline.onrender.com/ws/${clientId}`); 
        const editor = document.getElementById("editor");

        // --- NEW: Lock the editor until connected ---
        editor.disabled = true;
        editor.placeholder = "Connecting to server... Please wait (~50 seconds if asleep).";

        ws.onopen = function() {
            editor.disabled = false;
            editor.placeholder = "Type here...";
            console.log("WebSocket connection established!");
        };
        // --------------------------------------------

        let isSyncing = false; 
        let previousText = ""; 

        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            if (data.type === "sync") {
                if (data.origin === clientId) return; 

                isSyncing = true;
                const isFocused = document.activeElement === editor;
                const cursorPosition = editor.selectionStart;
                const oldLength = editor.value.length;
                
                // --- THE CURSOR FIX ---
                // Find exactly where the remote text changed so we don't move 
                // your cursor if someone else is typing below you.
                let diffStart = 0;
                while (diffStart < oldLength && diffStart < data.content.length && previousText[diffStart] === data.content[diffStart]) {
                    diffStart++;
                }
                
                editor.value = data.content; 
                previousText = data.content; 
                
                if (isFocused) {
                    const lengthDiff = data.content.length - oldLength;
                    let newCursor = cursorPosition;
                    
                    // Only push the cursor forward if the remote change happened BEFORE our cursor
                    if (diffStart < cursorPosition) {
                        newCursor += lengthDiff;
                    }
                    editor.setSelectionRange(newCursor, newCursor); 
                }
                isSyncing = false;
            }
        };

        editor.addEventListener('input', function(e) {
            if (isSyncing) return;
            
            const currentText = editor.value;

            // --- THE INDEX FIX: Prefix/Suffix Diffing ---
            
            // 1. Find how many characters match at the START
            let prefixLen = 0;
            while (prefixLen < previousText.length && prefixLen < currentText.length && previousText[prefixLen] === currentText[prefixLen]) {
                prefixLen++;
            }
            
            // 2. Find how many characters match at the END
            let suffixLen = 0;
            while (suffixLen < (previousText.length - prefixLen) && suffixLen < (currentText.length - prefixLen) && 
                   previousText[previousText.length - 1 - suffixLen] === currentText[currentText.length - 1 - suffixLen]) {
                suffixLen++;
            }
            
            // 3. Calculate what was deleted in the middle
            const deletedLen = previousText.length - prefixLen - suffixLen;
            if (deletedLen > 0) {
                ws.send(JSON.stringify({
                    type: "delete",
                    index: prefixLen,
                    length: deletedLen
                }));
            }
            
            // 4. Calculate what was inserted in the middle
            const insertedText = currentText.slice(prefixLen, currentText.length - suffixLen);
            for (let j = 0; j < insertedText.length; j++) {
                ws.send(JSON.stringify({
                    type: "insert",
                    index: prefixLen + j,
                    value: insertedText[j]
                }));
            }

            // Sync the shadow state
            previousText = currentText; 
        });
    </script>
</body>
</html>
